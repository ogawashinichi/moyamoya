<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイト設定 — 新聞記者のもやもや話</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm7 9a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
            </svg>
          </div>
          <div>
            <div class="logo-name">新聞記者のもやもや話</div>
            <div class="logo-sub">X SPACES ARCHIVE</div>
          </div>
        </a>
        <nav class="site-nav">
          <a href="/admin.html" class="nav-link">管理画面</a>
          <button class="btn-logout" id="btn-logout">ログアウト</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">

      <div class="admin-page-header">
        <div>
          <div class="admin-breadcrumb"><a href="/admin.html">管理画面</a> › サイト設定</div>
          <h1>サイト設定</h1>
          <p>公開ページのテキストを編集できます。</p>
        </div>
      </div>

      <div class="admin-nav-tabs">
        <a href="/admin.html" class="admin-nav-tab">📋 エピソード管理</a>
        <a href="/settings.html" class="admin-nav-tab active">⚙️ サイト設定</a>
        <a href="/profiles.html" class="admin-nav-tab">👤 話者プロフィール</a>
        <a href="/messages.html" class="admin-nav-tab" id="nav-messages">💬 メッセージ</a>
      </div>

      <div class="admin-card" style="max-width:720px;">
        <h2>トップページの説明文</h2>
        <div class="form-group" style="margin-top:16px;">
          <label for="setting-hero-desc">ヒーローセクションの説明文</label>
          <textarea id="setting-hero-desc" rows="5" placeholder="サイトの説明文を入力してください" style="font-size:14px;line-height:1.8;"></textarea>
        </div>
        <button class="btn-submit" onclick="saveSettings()" style="max-width:200px;">保存する</button>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>新聞記者のもやもや話 — X Spaces Archive &nbsp;|&nbsp; <a href="/">アーカイブ一覧に戻る</a></p>
    </div>
  </footer>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>
  <script src="settings.js"></script>
</body>
</html>
