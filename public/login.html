<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン — 新聞記者のもやもや話</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-blob-1"></div>
    <div class="login-blob-2"></div>

    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm7 9a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
          </svg>
        </div>
        <div>
          <div class="login-logo-text">新聞記者のもやもや話</div>
          <div class="login-logo-sub">X SPACES ARCHIVE</div>
        </div>
      </div>

      <h1 class="login-title">管理者ログイン</h1>
      <p class="login-subtitle">エピソードの登録・編集ができます</p>

      <form id="login-form">
        <div class="login-form-group">
          <label for="username">ユーザー名</label>
          <input type="text" id="username" name="username" autocomplete="username" required placeholder="ユーザー名を入力">
        </div>
        <div class="login-form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="パスワードを入力">
        </div>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="login-btn" id="login-btn">ログイン</button>
      </form>

      <p class="login-back"><a href="/">← アーカイブに戻る</a></p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'ログイン中…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/admin.html';
        } else {
          errorEl.textContent = data.error || 'ログインに失敗しました';
          btn.disabled = false;
          btn.textContent = 'ログイン';
        }
      } catch {
        errorEl.textContent = 'エラーが発生しました';
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
    });
  </script>
</body>
</html>
