<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寄せられたメッセージ — 新聞記者のもやもや話</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm7 9a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
            </svg>
          </div>
          <div>
            <div class="logo-name">新聞記者のもやもや話</div>
          </div>
        </a>
        <nav class="site-nav">
          <a href="/admin.html" class="nav-link">管理画面</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">

      <div class="admin-page-header">
        <div>
          <h1>寄せられたメッセージ</h1>
          <p>公開ページのフォームから届いた感想・テーマリクエストです。</p>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <span class="msg-badge" id="msg-unread-badge" style="display:none;font-size:13px;padding:4px 12px;"></span>
          <button class="btn-logout" id="btn-logout">ログアウト</button>
        </div>
      </div>

      <div class="msg-toolbar">
        <button class="msg-filter-btn active" onclick="filterMessages('all', this)">すべて</button>
        <button class="msg-filter-btn" onclick="filterMessages('unread', this)">未読のみ</button>
        <button class="msg-filter-btn" onclick="filterMessages('read', this)">既読のみ</button>
        <button class="msg-mark-all-btn" onclick="markAllRead()" id="btn-mark-all">すべて既読にする</button>
      </div>

      <div id="messages-list">
        <p class="loading-text">読み込み中…</p>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>新聞記者のもやもや話 — X Spaces Archive &nbsp;|&nbsp; <a href="/">アーカイブ一覧に戻る</a></p>
    </div>
  </footer>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="messages.js"></script>
</body>
</html>
